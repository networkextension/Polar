<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Markdown 编辑器</title>
    <link rel="icon" type="image/svg+xml" href="/assets/polaris-logo.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="site-shell">
    <div class="page-shell-wide">
      <a class="site-brand-banner" href="/dashboard.html" data-site-brand>
        <img class="site-brand-icon" data-site-icon alt="站点图标" />
        <div class="site-brand-copy">
          <div class="site-brand-name" data-site-name>Polar-</div>
          <div class="site-brand-description" data-site-description>正在加载站点信息...</div>
        </div>
      </a>

      <div class="dashboard">
      <div class="dashboard-header">
        <div>
          <h1>Markdown 编辑器</h1>
          <p id="welcomeText">新建一条记录</p>
        </div>
        <button id="backBtn" class="btn-inline btn-secondary" type="button">返回控制台</button>
      </div>

      <div id="alert" class="alert"></div>

      <div class="panel">
        <div class="toolbar">
          <input id="titleInput" type="text" placeholder="标题" />
          <button id="saveBtn" class="btn-inline" type="button">保存</button>
        </div>
        <div class="editor-options">
          <label class="checkbox-label" for="publicToggle">
            <input id="publicToggle" type="checkbox" />
            <span>公开可见（其他用户可查看，但不能编辑）</span>
          </label>
          <div id="publicHint" class="status-text">默认仅自己可见。</div>
        </div>
        <div class="grid">
          <div>
            <textarea id="contentInput" placeholder="在这里输入 Markdown 内容..."></textarea>
          </div>
          <div>
            <div class="badge">预览（原文）</div>
            <div id="preview" class="content-box">暂无内容</div>
          </div>
        </div>
      </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script type="module" src="/scripts/editor.js"></script>
  </body>
</html>
