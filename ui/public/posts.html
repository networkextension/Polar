<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>帖子广场</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="posts-page">
      <div class="dashboard-header">
        <div>
          <h1>帖子广场</h1>
          <p id="postWelcome">正在加载用户信息...</p>
        </div>
        <div class="header-actions">
          <a class="btn-inline btn-secondary" href="/dashboard.html">返回控制台</a>
        </div>
      </div>

      <div class="panel post-form-panel">
        <div class="badge">发布新帖</div>
        <form id="postForm" class="post-form">
          <label class="form-label" for="postContent">内容</label>
          <textarea id="postContent" class="input textarea" rows="4" placeholder="分享你的想法..." required></textarea>

          <label class="form-label" for="postImages">图片（至少 1 张）</label>
          <input id="postImages" class="input" type="file" accept="image/*" multiple required />

          <div id="postFormStatus" class="status-text"></div>
          <div class="post-form-actions">
            <button id="postSubmitBtn" class="btn-secondary" type="submit">发布</button>
          </div>
        </form>
      </div>

      <div class="posts-list">
        <div class="badge">最新帖子</div>
        <div id="postList" class="post-list"></div>
        <button id="postLoadMoreBtn" class="btn-inline btn-secondary" type="button">加载更多</button>
      </div>
    </div>

    <script>
      const API_BASE = "http://localhost:8080";
      const postWelcome = document.getElementById("postWelcome");
      const postForm = document.getElementById("postForm");
      const postContent = document.getElementById("postContent");
      const postImages = document.getElementById("postImages");
      const postFormStatus = document.getElementById("postFormStatus");
      const postSubmitBtn = document.getElementById("postSubmitBtn");
      const postList = document.getElementById("postList");
      const postLoadMoreBtn = document.getElementById("postLoadMoreBtn");

      let nextOffset = 0;
      let hasMore = true;

      function buildAssetUrl(url) {
        if (!url) return "";
        if (url.startsWith("http://") || url.startsWith("https://")) return url;
        return `${API_BASE}${url}`;
      }

      function formatTime(value) {
        return new Date(value).toLocaleString();
      }

      async function loadProfile() {
        const res = await fetch(`${API_BASE}/api/me`, { credentials: "include" });
        if (!res.ok) {
          window.location.href = "/login.html";
          return;
        }
        const data = await res.json();
        postWelcome.textContent = `你好，${data.username}，发布你的第一篇帖子吧。`;
      }

      function renderReplies(container, replies) {
        if (!replies || replies.length === 0) {
          container.innerHTML = "<div class='reply-empty'>暂无回复</div>";
          return;
        }
        container.innerHTML = replies
          .map((reply) => {
            return `
              <div class="reply-item">
                <div class="reply-meta">${reply.username} · ${formatTime(reply.created_at)}</div>
                <div class="reply-content">${reply.content}</div>
              </div>
            `;
          })
          .join("");
      }

      async function loadReplies(postId, container) {
        container.innerHTML = "<div class='reply-empty'>加载中...</div>";
        const res = await fetch(`${API_BASE}/api/posts/${postId}/replies?limit=50`, {
          credentials: "include",
        });
        if (!res.ok) {
          container.innerHTML = "<div class='reply-empty'>无法加载回复</div>";
          return;
        }
        const data = await res.json();
        renderReplies(container, data.replies || []);
      }

      function createPostCard(post) {
        const card = document.createElement("div");
        card.className = "post-card panel";

        const images = (post.images || [])
          .map((url) => `<img src="${buildAssetUrl(url)}" alt="post image" />`)
          .join("");

        card.innerHTML = `
          <div class="post-header">
            <div class="post-author">${post.username}</div>
            <div class="post-time">${formatTime(post.created_at)}</div>
          </div>
          <div class="post-content">${post.content}</div>
          <div class="post-images">${images}</div>
          <div class="post-actions">
            <button class="btn-inline btn-secondary like-btn" type="button">
              ${post.liked_by_me ? "已点赞" : "点赞"} · ${post.like_count}
            </button>
            <button class="btn-inline btn-secondary reply-toggle" type="button">回复</button>
          </div>
          <div class="reply-box">
            <div class="reply-list"></div>
            <form class="reply-form">
              <input class="input reply-input" type="text" placeholder="写下你的回复..." required />
              <button class="btn-inline btn-secondary" type="submit">发送</button>
            </form>
          </div>
        `;

        const likeBtn = card.querySelector(".like-btn");
        const replyToggle = card.querySelector(".reply-toggle");
        const replyBox = card.querySelector(".reply-box");
        const replyList = card.querySelector(".reply-list");
        const replyForm = card.querySelector(".reply-form");
        const replyInput = card.querySelector(".reply-input");

        let repliesLoaded = false;

        likeBtn.addEventListener("click", async () => {
          const method = post.liked_by_me ? "DELETE" : "POST";
          const res = await fetch(`${API_BASE}/api/posts/${post.id}/like`, {
            method,
            credentials: "include",
          });
          if (!res.ok) return;
          post.liked_by_me = !post.liked_by_me;
          post.like_count += post.liked_by_me ? 1 : -1;
          likeBtn.textContent = `${post.liked_by_me ? "已点赞" : "点赞"} · ${post.like_count}`;
        });

        replyToggle.addEventListener("click", async () => {
          replyBox.classList.toggle("open");
          if (!repliesLoaded) {
            repliesLoaded = true;
            await loadReplies(post.id, replyList);
          }
        });

        replyForm.addEventListener("submit", async (event) => {
          event.preventDefault();
          const content = replyInput.value.trim();
          if (!content) return;
          const res = await fetch(`${API_BASE}/api/posts/${post.id}/replies`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            credentials: "include",
            body: JSON.stringify({ content }),
          });
          if (!res.ok) return;
          replyInput.value = "";
          await loadReplies(post.id, replyList);
        });

        return card;
      }

      async function loadPosts(reset = false) {
        if (reset) {
          nextOffset = 0;
          hasMore = true;
          postList.innerHTML = "";
        }
        if (!hasMore) return;

        const res = await fetch(`${API_BASE}/api/posts?limit=10&offset=${nextOffset}`, {
          credentials: "include",
        });
        if (!res.ok) {
          postList.innerHTML = "<div class='post-empty'>无法加载帖子</div>";
          return;
        }
        const data = await res.json();
        const posts = data.posts || [];
        if (reset && posts.length === 0) {
          postList.innerHTML = "<div class='post-empty'>暂无帖子</div>";
          hasMore = false;
          postLoadMoreBtn.style.display = "none";
          return;
        }

        posts.forEach((post) => {
          postList.appendChild(createPostCard(post));
        });

        hasMore = data.has_more;
        nextOffset = data.next_offset;
        postLoadMoreBtn.style.display = hasMore ? "inline-flex" : "none";
      }

      postForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        const content = postContent.value.trim();
        if (!content) {
          postFormStatus.textContent = "内容不能为空";
          return;
        }
        if (!postImages.files || postImages.files.length === 0) {
          postFormStatus.textContent = "至少选择一张图片";
          return;
        }

        postFormStatus.textContent = "正在发布...";
        postSubmitBtn.disabled = true;

        const formData = new FormData();
        formData.append("content", content);
        Array.from(postImages.files).forEach((file) => {
          formData.append("images", file);
        });

        try {
          const res = await fetch(`${API_BASE}/api/posts`, {
            method: "POST",
            credentials: "include",
            body: formData,
          });
          const data = await res.json();
          if (!res.ok) {
            postFormStatus.textContent = data.error || "发布失败";
            return;
          }
          postFormStatus.textContent = "发布成功";
          postForm.reset();
          await loadPosts(true);
        } catch (err) {
          postFormStatus.textContent = "发布失败，请重试";
        } finally {
          postSubmitBtn.disabled = false;
        }
      });

      postLoadMoreBtn.addEventListener("click", () => loadPosts(false));

      loadProfile();
      loadPosts(true);
    </script>
  </body>
</html>
