<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>登录</title>
    <link rel="icon" type="image/svg+xml" href="/assets/polaris-logo.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="card">
      <h1>欢迎回来</h1>
      <p>使用邮箱和密码登录</p>
      <div id="alert" class="alert"></div>
      <form id="loginForm">
        <label for="email">邮箱</label>
        <input id="email" name="email" type="email" required placeholder="you@example.com" />
        <label for="password">密码</label>
        <input id="password" name="password" type="password" required placeholder="••••••••" />
        <button type="submit">登录</button>
      </form>
      <button type="button" id="passkeyLoginBtn" class="btn-secondary">使用 Passkey 登录</button>
      <div id="passkeyStatus" class="status-text">需要先在账户内绑定 Passkey</div>
      <a class="link" href="/register.html">没有账户？去注册</a>
    </div>

    <script type="module" src="/scripts/login.js"></script>
  </body>
</html>
