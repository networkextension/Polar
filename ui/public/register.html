<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>注册</title>
    <link rel="icon" type="image/svg+xml" href="/assets/polaris-logo.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="card">
      <h1>创建账户</h1>
      <p>快速注册并开始体验</p>
      <div id="alert" class="alert"></div>
      <form id="registerForm">
        <label for="username">用户名</label>
        <input id="username" name="username" type="text" required minlength="3" placeholder="johndoe" />
        <label for="email">邮箱</label>
        <input id="email" name="email" type="email" required placeholder="you@example.com" />
        <label for="password">密码</label>
        <input id="password" name="password" type="password" required minlength="6" placeholder="至少6位" />
        <button type="submit">注册</button>
      </form>
      <a class="link" href="/login.html">已有账户？去登录</a>
    </div>

    <script type="module" src="/scripts/register.js"></script>
  </body>
</html>
