<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>私聊</title>
    <link rel="icon" type="image/svg+xml" href="/assets/polaris-logo.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="site-shell">
    <div class="page-shell-wide">
      <a class="site-brand-banner" href="/dashboard.html" data-site-brand>
        <img class="site-brand-icon" data-site-icon alt="站点图标" />
        <div class="site-brand-copy">
          <div class="site-brand-name" data-site-name>Polar-</div>
          <div class="site-brand-description" data-site-description>正在加载站点信息...</div>
        </div>
      </a>

      <div class="chat-page">
      <div class="dashboard-header">
        <div>
          <h1>私聊</h1>
          <p id="chatWelcome">正在加载...</p>
        </div>
        <div class="header-actions">
          <a class="btn-inline btn-secondary" href="/posts.html">返回帖子广场</a>
          <a class="btn-inline btn-secondary" href="/dashboard.html">返回控制台</a>
        </div>
      </div>

      <div class="chat-layout">
        <div class="chat-list panel">
          <div class="badge">会话列表</div>
          <div id="chatList" class="chat-list-body"></div>
        </div>

        <div class="chat-thread panel">
          <div class="chat-thread-header">
            <div>
              <div id="chatTitle" class="chat-title">选择一个会话</div>
              <div id="chatSubtitle" class="chat-subtitle">从左侧选择或从帖子用户名进入</div>
            </div>
            <div class="inline-actions">
              <button id="chatNewTopicBtn" class="btn-inline btn-secondary" type="button" hidden>新话题</button>
              <button id="chatRenameTopicBtn" class="btn-inline btn-secondary" type="button" hidden>重命名</button>
              <button id="chatRefreshBtn" class="btn-inline btn-secondary" type="button">刷新</button>
            </div>
          </div>
          <div id="chatThreadBar" class="chat-topic-bar" hidden>
            <label class="form-label chat-topic-label" for="chatThreadSelect">当前话题</label>
            <div class="chat-topic-controls">
              <select id="chatThreadSelect" class="input chat-topic-select"></select>
            </div>
            <div id="chatModelBar" class="chat-model-bar" hidden>
              <div class="chat-model-copy">
                <div class="chat-model-label">当前模型</div>
                <div id="chatModelCurrent" class="chat-model-current">跟随默认配置</div>
              </div>
              <div class="chat-model-controls">
                <select id="chatModelSelect" class="input chat-model-select"></select>
                <button id="chatSwitchModelBtn" class="btn-inline btn-secondary" type="button">切换模型</button>
              </div>
            </div>
          </div>
          <div id="messageList" class="message-list"></div>
          <form id="messageForm" class="message-form">
            <input id="messageInput" class="input message-input" type="text" placeholder="写点什么..." required />
            <button class="btn-inline btn-secondary" type="submit">发送</button>
          </form>
        </div>
      </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script type="module" src="/scripts/chat.js"></script>
  </body>
</html>
